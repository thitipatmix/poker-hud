<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Profiler by Onyx303</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-active { border-bottom: 3px solid #2563eb; color: #2563eb; font-weight: bold; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-200">
        <div class="bg-gray-800 p-4">
            <h1 class="text-white text-xl font-bold text-center">Onyx303 Poker Tool</h1>
            <p class="text-gray-400 text-xs text-center mt-1">6-Max Cash Game Specialist</p>
        </div>

        <div class="flex border-b">
            <button onclick="switchTab('analyzer')" id="tab-analyzer" class="flex-1 py-3 text-sm tab-active">🔍 Analyzer</button>
            <button onclick="switchTab('trainer')" id="tab-trainer" class="flex-1 py-3 text-sm text-gray-500">🎯 Trainer</button>
        </div>

        <div class="p-6">
            
            <div id="content-analyzer" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 uppercase">VPIP (%)</label>
                        <input type="number" id="vpip" class="w-full mt-1 p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="25">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 uppercase">PFR (%)</label>
                        <input type="number" id="pfr" class="w-full mt-1 p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="20">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 uppercase">ATS (Steal)</label>
                        <input type="number" id="ats" class="w-full mt-1 p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="35">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 uppercase">3-Bet (%)</label>
                        <input type="number" id="threebet" class="w-full mt-1 p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="8">
                    </div>
                </div>

                <button onclick="runAnalysis()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition shadow-lg">
                    วิเคราะห์ประเภทผู้เล่น
                </button>

                <div id="result-box" class="hidden mt-4 p-4 bg-blue-50 border-l-4 border-blue-500 rounded-r-lg">
                    <h3 id="player-type" class="font-bold text-blue-900 text-lg italic"></h3>
                    <p id="player-exploit" class="text-sm text-blue-800 mt-1"></p>
                </div>
            </div>

            <div id="content-trainer" class="hidden text-center py-10">
                <div class="bg-gray-50 p-6 rounded-xl border-2 border-dashed border-gray-300">
                    <p class="text-gray-600 font-medium">กำลังสุ่มสถานการณ์ให้คุณฝึกฝน...</p>
                    <p class="text-xs text-gray-400 mt-2 italic">เป้าหมาย: 20,000 THB / Month</p>
                    <button onclick="alert('ระบบสุ่มคำถามกำลังมาเร็วๆ นี้!')" class="mt-4 px-6 py-2 bg-gray-800 text-white rounded-full text-sm">เริ่มฝึก (Coming Soon)</button>
                </div>
            </div>

        </div>
    </div>

    <script>
        function switchTab(tab) {
            const analyzer = document.getElementById('content-analyzer');
            const trainer = document.getElementById('content-trainer');
            const tabA = document.getElementById('tab-analyzer');
            const tabT = document.getElementById('tab-trainer');

            if (tab === 'analyzer') {
                analyzer.classList.remove('hidden');
                trainer.classList.add('hidden');
                tabA.classList.add('tab-active');
                tabT.classList.remove('tab-active');
                tabT.classList.add('text-gray-500');
            } else {
                trainer.classList.remove('hidden');
                analyzer.classList.add('hidden');
                tabT.classList.add('tab-active');
                tabA.classList.remove('tab-active');
                tabA.classList.add('text-gray-500');
            }
        }

        function runAnalysis() {
            const v = parseFloat(document.getElementById('vpip').value) || 0;
            const p = parseFloat(document.getElementById('pfr').value) || 0;
            const a = parseFloat(document.getElementById('ats').value) || 0;
            const t = parseFloat(document.getElementById('threebet').value) || 0;

            let type = "";
            let exploit = "";

            if (v > 50 && p > 30) {
                type = "6. Recreational - Maniac";
                exploit = "💡 <b>กลยุทธ์:</b> Trap (วางกับดัก) ปล่อยให้เขาเบทใส่เราเอง อย่าบลัฟสู้ เพราะเขาไม่หมอบ";
            } else if (v > 40 && p < 15) {
                type = "5. Recreational - Whale";
                exploit = "💡 <b>กลยุทธ์:</b> เน้น Value Bet ให้หนักและบ่อยขึ้น เขาคอลด้วยไพ่แย่ๆ เยอะมาก";
            } else if (v <= 18 && p <= 15) {
                type = "1. Bad Reg - Nit";
                exploit = "💡 <b>กลยุทธ์:</b> Steal Blind บ่อยๆ เขาจะหมอบง่ายมาก แต่ถ้าเขาเบทมาหนักๆ ให้หมอบทันที";
            } else if (v >= 27 && p >= 22 && t >= 10) {
                type = "4. Good Reg - LAG";
                exploit = "💡 <b>กลยุทธ์:</b> ระวังการถูกกดดัน หาจังหวะ 4-Bet บลัฟในบางครั้งเพื่อเบรกจังหวะเขา";
            } else if (v >= 22 && p >= 18 && t >= 8) {
                type = "3. Good Reg - TAG";
                exploit = "💡 <b>กลยุทธ์:</b> เล่นอย่างรัดกุม เลือกกินกำไรจากผู้เล่นประเภทอื่นแทนการปะทะกับเขาตรงๆ";
            } else {
                type = "2. Bad Reg - TAGfish";
                exploit = "💡 <b>กลยุทธ์:</b> เขาเล่นตรงตัวเกินไป ใช้ Check-Raise เพื่อบีบให้เขาหมอบในบอร์ดที่เข้าทางเรา";
            }

            document.getElementById('player-type').innerText = type;
            document.getElementById('player-exploit').innerHTML = exploit;
            document.getElementById('result-box').classList.remove('hidden');
        }
    </script>
</body>
</html>
