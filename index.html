<script>
    const MY_PASS = "3030";
    let currentCorrectAnswer = 0;
    let currentDesc = "";

    function checkPass() {
        if(document.getElementById('pass-input').value === MY_PASS) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            generateQuiz();
        } else { alert("ACCESS DENIED"); }
    }

    function showTab(tab) {
        document.getElementById('section-analyzer').style.display = tab === 'analyzer' ? 'block' : 'none';
        document.getElementById('section-trainer').style.display = tab === 'trainer' ? 'block' : 'none';
        document.getElementById('btn-ana').className = tab === 'analyzer' ? 'tab-btn active' : 'tab-btn';
        document.getElementById('btn-tra').className = tab === 'trainer' ? 'tab-btn active' : 'tab-btn';
    }

    // --- ANALYZER LOGIC ---
    function getPlayerType(v, p, a, b) {
        const gap = v - p;
        if (v >= 45 && p >= 31) return { id: 6, name: "6. RECREATIONAL - MANIAC", color: "var(--c-maniac)", desc: "ดุเกินเหตุ (VPIP/PFR สูงมากทั้งคู่)" };
        if (v >= 40 && gap >= 18) return { id: 5, name: "5. RECREATIONAL - WHALE", color: "var(--c-whale)", desc: "ปลาชอบคอล (VPIP สูงแต่ PFR ต่ำ/Gap กว้าง)" };
        if (v <= 17 && p <= 14) return { id: 1, name: "1. BAD REG - NIT", color: "var(--c-nit)", desc: "เล่นแคบมาก (สถิติต่ำทุกค่า)" };
        if (v >= 26 && p >= 21 && b >= 10) return { id: 4, name: "4. GOOD REG - LAG", color: "var(--c-lag)", desc: "ดุดันและเก่ง (3-Bet และ ATS สูง)" };
        if (v >= 19 && v <= 26 && gap <= 6 && b >= 6) return { id: 3, name: "3. GOOD REG - TAG", color: "var(--c-tag)", desc: "สมดุลมาตรฐาน (สถิติเกาะกลุ่มกันดี)" };
        return { id: 2, name: "2. BAD REG - TAGFISH", color: "var(--c-tagfish)", desc: "เล่นตรงตัว (Passive เกินไปในบางจุด)" };
    }

    function analyze() {
        const v = parseInt(document.getElementById('v').value);
        const p = parseInt(document.getElementById('p').value);
        const a = parseInt(document.getElementById('a').value);
        const b = parseInt(document.getElementById('b').value);
        
        const res = getPlayerType(v, p, a, b);
        
        // (ส่วนการแสดงผล Reads/Exploit ใช้ Logic เดิมจาก v9.0 ได้เลยครับ)
        document.getElementById('result').style.display = 'block';
        document.getElementById('res-head').innerText = res.name;
        document.getElementById('res-head').style.backgroundColor = res.color;
        // ... (โค้ดส่วนแสดงผล Tips และ Copy ยังคงเดิม)
    }

    // --- NEW DYNAMIC TRAINER ENGINE ---
    function generateQuiz() {
        // ล้างค่าเก่า
        document.getElementById('quiz-feedback').style.display = 'none';
        
        // สุ่มตัวเลขแบบมีความหมาย
        let v, p, a, b;
        const typeSeed = Math.floor(Math.random() * 6) + 1; // สุ่มเลือกประเภทที่จะสร้างโจทย์

        switch(typeSeed) {
            case 1: // Nit
                v = Math.floor(Math.random() * 6) + 10; // 10-15
                p = v - Math.floor(Math.random() * 3);  // เกือบเท่า VPIP
                a = Math.floor(Math.random() * 10) + 15;
                b = Math.floor(Math.random() * 3) + 2;
                break;
            case 5: // Whale
                v = Math.floor(Math.random() * 20) + 40; // 40-60
                p = Math.floor(Math.random() * 15) + 5;  // 5-20
                a = Math.floor(Math.random() * 15) + 10;
                b = Math.floor(Math.random() * 4) + 1;
                break;
            case 6: // Maniac
                v = Math.floor(Math.random() * 30) + 50; // 50-80
                p = v - Math.floor(Math.random() * 15);  // ดุไล่เลี่ยกับ VPIP
                a = Math.floor(Math.random() * 30) + 50;
                b = Math.floor(Math.random() * 15) + 15;
                break;
            case 4: // LAG
                v = Math.floor(Math.random() * 7) + 27;  // 27-34
                p = v - Math.floor(Math.random() * 5);
                a = Math.floor(Math.random() * 15) + 45;
                b = Math.floor(Math.random() * 6) + 11;
                break;
            default: // TAG / TAGfish
                v = Math.floor(Math.random() * 8) + 19;  // 19-27
                p = v - Math.floor(Math.random() * 6);
                a = Math.floor(Math.random() * 20) + 25;
                b = Math.floor(Math.random() * 5) + 5;
        }

        // คำนวณหาคำตอบที่ถูกต้องจากตัวเลขที่สุ่มได้
        const result = getPlayerType(v, p, a, b);
        currentCorrectAnswer = result.id;
        currentDesc = result.desc;

        document.getElementById('quiz-stats').innerText = `${v} / ${p} / ${a} / ${b}`;
    }

    function checkAnswer(choice) {
        const feedback = document.getElementById('feedback-box');
        document.getElementById('quiz-feedback').style.display = 'block';
        
        if(choice === currentCorrectAnswer) {
            feedback.style.backgroundColor = "var(--c-whale)"; 
            feedback.innerHTML = `ถูกต้อง! <br><span style="font-size:12px; font-weight:normal;">${currentDesc}</span>`;
        } else {
            feedback.style.backgroundColor = "var(--c-maniac)"; 
            feedback.innerHTML = `ผิด! คำตอบคือเบอร์ ${currentCorrectAnswer} <br><span style="font-size:12px; font-weight:normal;">(${currentDesc})</span>`;
        }
    }
</script>
