<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ONYX PRIVATE HUD v6.3</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #38bdf8; --nit: #f43f5e; --fish: #10b981; --maniac: #f59e0b; --reg: #6366f1; }
        body { background-color: var(--bg); color: #f8fafc; font-family: sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app-container { max-width: 450px; width: 100%; margin: auto; }
        #login-screen { text-align: center; background: var(--card); padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        #main-app { display: none; width: 100%; }
        input[type="password"] { width: 80%; padding: 15px; font-size: 24px; text-align: center; border-radius: 12px; border: 1px solid #334155; background: #0f172a; color: white; margin-bottom: 20px; letter-spacing: 10px; }
        .btn-login { background: var(--primary); color: #0f172a; padding: 15px 40px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .stat-card { background: var(--card); padding: 15px; border-radius: 12px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        select { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 8px; font-size: 15px; text-align: center; appearance: none; }
        label { font-size: 11px; color: #94a3b8; display: block; margin-bottom: 4px; font-weight: bold; text-align: center; }
        .btn-main { width: 100%; padding: 16px; background: var(--primary); color: #0f172a; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; }
        #result { display: none; margin-top: 10px; }
        .res-header { padding: 10px; border-radius: 8px 8px 0 0; font-weight: bold; text-align: center; color: white; font-size: 16px; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
        .res-body { background: var(--card); padding: 15px; border-radius: 0 0 8px 8px; border: 1px solid #334155; }
        .info-box { margin-bottom: 12px; border-left: 3px solid var(--primary); padding-left: 10px; }
        .info-title { font-size: 10px; color: var(--primary); font-weight: bold; text-transform: uppercase; margin-bottom: 2px; }
        .info-desc { font-size: 13px; line-height: 1.4; color: #e2e8f0; }
        .btn-copy { width: 100%; padding: 12px; background: #334155; color: #38bdf8; border: 1px solid #38bdf8; border-radius: 8px; font-weight: bold; margin-top: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="login-screen" class="app-container">
        <h2 style="color: var(--primary)">ONYX SECURE</h2>
        <input type="password" id="pass-input" maxlength="4" placeholder="****">
        <br><button class="btn-login" onclick="checkPass()">ENTER HUD</button>
    </div>

    <div id="main-app" class="app-container">
        <div style="text-align: center; margin-bottom: 15px;">
            <h2 style="margin:0; color:var(--primary); font-size: 20px;">ONYX PRO-HUD v6.3</h2>
            <small style="color: #64748b;">BlackRain79 Specialized Logic</small>
        </div>
        <div class="stat-card">
            <div><label>VPIP</label><select id="v">
                <option value="12">Nit (< 15%)</option><option value="20">Tight (16-24%)</option>
                <option value="30">Semi-Lag (25-35%)</option><option value="45">Fish (36-50%)</option>
                <option value="60">Whale (50%+)</option>
            </select></div>
            <div><label>PFR</label><select id="p">
                <option value="8">Passive (< 10%)</option><option value="15">Tight (11-17%)</option>
                <option value="22">Aggro (18-25%)</option><option value="35">Maniac (26%+)</option>
            </select></div>
            <div><label>ATS</label><select id="a">
                <option value="20">Low (< 25%)</option><option value="35">Normal (25-45%)</option>
                <option value="55">High (45%+)</option>
            </select></div>
            <div><label>3-BET</label><select id="b">
                <option value="3">Low (< 5%)</option><option value="7">Normal (5-9%)</option>
                <option value="12">High (10%+)</option>
            </select></div>
        </div>
        <button class="btn-main" onclick="analyze()">วิเคราะห์เชิงลึก</button>
        <div id="result">
            <div id="res-head" class="res-header"></div>
            <div class="res-body">
                <div class="info-box"><div class="info-title">🔴 READS</div><div id="weak-tip" class="info-desc"></div></div>
                <div class="info-box"><div class="info-title">🔵 EXPLOIT</div><div id="exp-tip" class="info-desc"></div></div>
                <button class="btn-copy" id="copy-btn" onclick="copyToClipboard()">📋 COPY TO N8 NOTES</button>
            </div>
        </div>
    </div>

    <script>
        const MY_PASS = "3030";
        function checkPass() {
            if(document.getElementById('pass-input').value === MY_PASS) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
            } else { alert("รหัสผิด!"); }
        }

        function analyze() {
            const v = parseInt(document.getElementById('v').value);
            const p = parseInt(document.getElementById('p').value);
            const b = parseInt(document.getElementById('b').value);
            const resArea = document.getElementById('result');
            resArea.style.display = 'block';
            
            let res = { type: "", color: "", read: "", exp: "" };

            // LOGIC v6.3 - ประมวลผลแม่นยำขึ้น
            if (v < 24 && p < 17) {
                res = { type: "NIT (ไพ่เทพเท่านั้น)", color: "#f43f5e", read: "เล่นแคบมาก ระวังตัวสูง ถ้าเขา Bet หนักแปลว่ามีของจริง", exp: "ขโมย Blind ได้บ่อย, C-Bet เล็กๆ ใส่ได้เกือบทุกบอร์ด ถ้าเขา Raise มาให้หมอบทันที" };
            } else if (v >= 36 && p < 20) {
                res = { type: "FISH / STATION", color: "#10b981", read: "ชอบ Limp-Call เล่นไพ่ขยะเยอะ ไม่ชอบหมอบ", exp: "ห้ามบลัฟเด็ดขาด! เน้น Value Bet ใหญ่ๆ เมื่อมีไพ่เหนือกว่า" };
            } else if (p >= 26 || b >= 12) {
                res = { type: "MANIAC (สายคลั่ง)", color: "#f59e0b", read: "ดุดันเกินเหตุ บลัฟบ่อยเกินความจำเป็น", exp: "ปล่อยให้เขาบลัฟใส่ (Trap) แล้ว Call กินกองใหญ่" };
            } else {
                res = { type: "REGULAR (ขาประจำ)", color: "#6366f1", read: "เล่นเป็นระบบ รู้จังหวะหมอบและสู้", exp: "หลีกเลี่ยงการปะทะถ้าไม่มีไพ่ดีจริง หาปลาที่โต๊ะกินง่ายกว่า" };
            }

            document.getElementById('res-head').innerText = res.type;
            document.getElementById('res-head').style.backgroundColor = res.color;
            document.getElementById('weak-tip').innerText = res.read;
            document.getElementById('exp-tip').innerText = res.exp;
        }

        function copyToClipboard() {
            const type = document.getElementById('res-head').innerText;
            const exp = document.getElementById('exp-tip').innerText;
            navigator.clipboard.writeText(`[${type}] กลยุทธ์: ${exp}`).then(() => {
                document.getElementById('copy-btn').innerText = "✅ COPIED!";
                setTimeout(() => { document.getElementById('copy-btn').innerText = "📋 COPY TO N8 NOTES"; }, 2000);
            });
        }
    </script>
</body>
</html>
