<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ONYX SMART HUD v11.0 (Color Tag Edition)</title>
    <style>
        :root { 
            --bg: #030712; --card: #1f2937; --primary: #38bdf8; 
            /* GG Color Guide */
            --tag-red: #ff3b30;    --tag-orange: #ff9500;
            --tag-yellow: #ffcc00;  --tag-green: #34c759;
            --tag-blue: #007aff;    --tag-purple: #af52de;
            --tag-pink: #ff2d55;    --tag-cyan: #5ac8fa;
        }
        body { background-color: var(--bg); color: #f9fafb; font-family: -apple-system, sans-serif; margin: 0; padding: 12px; display: flex; justify-content: center; min-height: 100vh; }
        .app-container { max-width: 450px; width: 100%; }
        #login-screen { text-align: center; background: var(--card); padding: 40px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); margin-top: 60px; width: 100%; max-width: 350px; align-self: flex-start; }
        #main-app { display: none; width: 100%; max-width: 450px; }
        input[type="password"] { width: 80%; padding: 12px; font-size: 20px; text-align: center; border-radius: 10px; border: 1px solid var(--primary); background: #111827; color: white; margin-bottom: 20px; outline: none; }
        .btn-login { background: var(--primary); color: #030712; padding: 12px 30px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        
        .tab-container { display: flex; gap: 5px; margin-bottom: 15px; background: #111827; padding: 5px; border-radius: 12px; }
        .tab-btn { flex: 1; padding: 10px; border: none; border-radius: 8px; background: transparent; color: #9ca3af; font-weight: bold; cursor: pointer; font-size: 13px; }
        .tab-btn.active { background: var(--primary); color: #030712; }

        .stat-card { background: var(--card); padding: 15px; border-radius: 12px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; border: 1px solid #374151; }
        select { width: 100%; padding: 10px; background: #111827; border: 1px solid #4b5563; color: white; border-radius: 8px; font-size: 14px; text-align: center; }
        label { font-size: 10px; color: var(--primary); font-weight: bold; display: block; margin-bottom: 4px; text-transform: uppercase; text-align: center; }
        .btn-main { width: 100%; padding: 16px; background: linear-gradient(135deg, #38bdf8, #2563eb); color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; }
        
        #result { display: none; margin-top: 12px; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .res-container { border-radius: 12px; overflow: hidden; border: 1px solid #374151; }
        .res-header { padding: 12px; font-weight: 800; text-align: center; color: white; font-size: 16px; }
        .res-body { background: #1f2937; padding: 15px; }
        .color-mark-box { display: flex; align-items: center; justify-content: center; gap: 10px; background: #111827; padding: 8px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #38bdf8; }
        .color-dot { width: 20px; height: 20px; border-radius: 4px; border: 1px solid white; }
        .info-desc { font-size: 13px; line-height: 1.5; color: #d1d5db; margin-bottom: 10px; }
        .info-desc span { display: block; margin-bottom: 4px; }
        .btn-copy { width: 100%; padding: 12px; background: #374151; color: #38bdf8; border: 1px solid #38bdf8; border-radius: 8px; font-weight: bold; cursor: pointer; }

        .quiz-box { background: var(--card); padding: 20px; border-radius: 12px; border: 1px dashed var(--primary); text-align: center; }
        .quiz-stat-display { font-size: 26px; font-weight: bold; color: white; margin: 15px 0; letter-spacing: 1px; }
        .quiz-options { display: grid; grid-template-columns: 1fr; gap: 8px; margin-top: 15px; }
        .opt-btn { padding: 12px; background: #374151; border: 1px solid #4b5563; color: white; border-radius: 8px; cursor: pointer; font-size: 14px; text-align: left; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2 style="color: var(--primary); margin-top: 0;">ONYX SMART HUD</h2>
        <input type="password" id="pass-input" maxlength="4" placeholder="••••">
        <br><button class="btn-login" onclick="checkPass()">ACCESS</button>
    </div>

    <div id="main-app" class="app-container">
        <div style="text-align: center; margin-bottom: 15px;">
            <h2 style="margin:0; color:var(--primary); font-size: 20px;">ONYX PRO HUD v11.0</h2>
        </div>

        <div class="tab-container">
            <button class="tab-btn active" id="btn-ana" onclick="showTab('analyzer')">🔍 ANALYZER</button>
            <button class="tab-btn" id="btn-tra" onclick="showTab('trainer')">🎯 TRAINER</button>
        </div>

        <div id="section-analyzer">
            <div class="stat-card">
                <div><label>VPIP</label><select id="v">
                    <option value="12">Nit (< 15%)</option><option value="22" selected>Tight (16-25%)</option>
                    <option value="32">LAG (26-35%)</option><option value="45">Fish (36-50%)</option>
                    <option value="65">Whale (50%+)</option>
                </select></div>
                <div><label>PFR</label><select id="p">
                    <option value="8">Passive (< 10%)</option><option value="18" selected>Moderate (11-20%)</option>
                    <option value="26">Aggro (21-30%)</option><option value="40">Maniac (31%+)</option>
                </select></div>
                <div><label>ATS (Steal)</label><select id="a">
                    <option value="20">Low (< 25%)</option><option value="35" selected>Normal (25-45%)</option>
                    <option value="55">Extreme (45%+)</option>
                </select></div>
                <div><label>3-BET</label><select id="b">
                    <option value="4">Low (< 5%)</option><option value="8" selected>Standard (5-10%)</option>
                    <option value="13">High (10%+)</option>
                </select></div>
            </div>
            <button class="btn-main" onclick="analyze()">ANALYZE TYPE</button>
            
            <div id="result">
                <div class="res-container">
                    <div id="res-head" class="res-header"></div>
                    <div class="res-body">
                        <div class="color-mark-box">
                            <span style="font-size: 12px; color: #38bdf8; font-weight: bold;">GG TAG:</span>
                            <div id="suggested-color-dot" class="color-dot"></div>
                            <span id="suggested-color-name" style="font-size: 13px; font-weight: bold;"></span>
                        </div>
                        <div id="weak-tip" class="info-desc"></div>
                        <div id="exp-tip" class="info-desc"></div>
                        <button class="btn-copy" id="copy-btn" onclick="copyGGNote()">📋 คัดลอกโน้ต</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="section-trainer" style="display: none;">
            <div class="quiz-box">
                <div style="font-size: 12px; color: var(--primary);">วิเคราะห์ประเภทจากสถิติที่สุ่มได้</div>
                <div id="quiz-stats" class="quiz-stat-display">-- / -- / -- / --</div>
                <div class="quiz-options">
                    <button class="opt-btn" onclick="checkAnswer(1)">1. Bad Reg - Nit</button>
                    <button class="opt-btn" onclick="checkAnswer(2)">2. Bad Reg - TAGfish</button>
                    <button class="opt-btn" onclick="checkAnswer(3)">3. Good Reg - TAG</button>
                    <button class="opt-btn" onclick="checkAnswer(4)">4. Good Reg - LAG</button>
                    <button class="opt-btn" onclick="checkAnswer(5)">5. Recreational - Whale</button>
                    <button class="opt-btn" onclick="checkAnswer(6)">6. Recreational - Maniac</button>
                </div>
            </div>
            <div id="quiz-feedback" style="margin-top: 15px; display: none;">
                <div id="feedback-box" style="padding: 15px; border-radius: 12px; text-align: center; font-weight: bold; color: white;"></div>
                <button class="btn-main" style="margin-top: 10px;" onclick="generateQuiz()">โจทย์ถัดไป</button>
            </div>
        </div>
    </div>

    <script>
        const MY_PASS = "3030";
        let currentCorrectAnswer = 0;
        let currentDesc = "";

        function checkPass() {
            if(document.getElementById('pass-input').value === MY_PASS) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                generateQuiz();
            } else { alert("ACCESS DENIED"); }
        }

        function showTab(tab) {
            document.getElementById('section-analyzer').style.display = tab === 'analyzer' ? 'block' : 'none';
            document.getElementById('section-trainer').style.display = tab === 'trainer' ? 'block' : 'none';
            document.getElementById('btn-ana').className = tab === 'analyzer' ? 'tab-btn active' : 'tab-btn';
            document.getElementById('btn-tra').className = tab === 'trainer' ? 'tab-btn active' : 'tab-btn';
        }

        function getPlayerType(v, p, a, b) {
            const gap = v - p;
            if (v >= 45 && p >= 30) return { id: 6, name: "6. RECREATIONAL - MANIAC", color: "var(--tag-red)", colorName: "RED (ดุจัด)", w: ["บ้าดีเดือด", "เบทมั่วซั่ว"], e: ["Trap (วางกับดัก)", "ห้ามบลัฟสวน"], d: "Maniac: VPIP/PFR สูงมาก" };
            if (v >= 40 && gap >= 18) return { id: 5, name: "5. RECREATIONAL - WHALE", color: "var(--tag-green)", colorName: "GREEN (ปลาคอล)", w: ["ปลาตัวใหญ่", "คอลทุกอย่าง"], e: ["Thin Value Bet", "ห้ามบลัฟเด็ดขาด"], d: "Whale: VPIP สูงแต่ PFR ต่ำ" };
            if (v <= 17 && p <= 14) return { id: 1, name: "1. BAD REG - NIT", color: "var(--tag-orange)", colorName: "ORANGE (นิต)", w: ["เล่นแคบมาก", "รอแต่ Nuts"], e: ["ขโมย Blind ยับๆ", "หมอบถ้าเขา Raise"], d: "Nit: เล่นเฉพาะไพ่ดีสุด" };
            if (v >= 26 && p >= 21 && b >= 10) return { id: 4, name: "4. GOOD REG - LAG", color: "var(--tag-purple)", colorName: "PURPLE (ดุเก่ง)", w: ["ดุดันและเก่ง", "3-Bet บ่อย"], e: ["ระวังถูกขโมย", "4-Bet บลัฟบ้าง"], d: "LAG: ดุดัน ATS/3-Bet สูง" };
            if (v >= 19 && v <= 26 && gap <= 6 && b >= 6) return { id: 3, name: "3. GOOD REG - TAG", color: "var(--tag-blue)", colorName: "BLUE (Reg ดี)", w: ["มาตรฐานดี", "Balanced"], e: ["เลี่ยงการปะทะ", "กินกำไรจากปลา"], d: "TAG: สถิติสมดุลมาตรฐาน" };
            return { id: 2, name: "2. BAD REG - TAGFISH", color: "var(--tag-cyan)", colorName: "CYAN (Reg อ่อน)", w: ["เล่นตรงตัว", "Passive ไปนิด"], e: ["Check-Raise บีบหมอบ", "โจมตีบอร์ด"], d: "TAGfish: สถิติดูกลางๆ" };
        }

        function analyze() {
            const v = parseInt(document.getElementById('v').value);
            const p = parseInt(document.getElementById('p').value);
            const a = parseInt(document.getElementById('a').value);
            const b = parseInt(document.getElementById('b').value);
            const res = getPlayerType(v, p, a, b);

            document.getElementById('result').style.display = 'block';
            document.getElementById('res-head').innerText = res.name;
            document.getElementById('res-head').style.backgroundColor = res.color;
            
            // แสดงข้อมูลสีแนะนำ
            document.getElementById('suggested-color-dot').style.backgroundColor = res.color;
            document.getElementById('suggested-color-name').innerText = res.colorName;
            document.getElementById('suggested-color-name').style.color = res.color;

            document.getElementById('weak-tip').innerHTML = `<strong>🔴 สังเกต (Reads)</strong><br>` + res.w.map(t => `<span>• ${t}</span>`).join('');
            document.getElementById('exp-tip').innerHTML = `<strong>🔵 วิธีชนะ (Exploit)</strong><br>` + res.e.map(t => `<span>• ${t}</span>`).join('');
            document.getElementById('copy-btn').dataset.ggnote = `[${res.name}]\nColor: ${res.colorName}\nExploit: ${res.e.join(', ')}`;
        }

        function generateQuiz() {
            document.getElementById('quiz-feedback').style.display = 'none';
            let v, p, a, b;
            const typeSeed = Math.floor(Math.random() * 6) + 1;
            switch(typeSeed) {
                case 1: v = 12; p = 10; a = 15; b = 3; break;
                case 5: v = 50; p = 12; a = 10; b = 2; break;
                case 6: v = 65; p = 50; a = 60; b = 20; break;
                case 4: v = 28; p = 24; a = 48; b = 12; break;
                case 3: v = 22; p = 19; a = 35; b = 8; break;
                default: v = 24; p = 15; a = 25; b = 5;
            }
            const res = getPlayerType(v, p, a, b);
            currentCorrectAnswer = res.id;
            currentDesc = res.d;
            document.getElementById('quiz-stats').innerText = `${v} / ${p} / ${a} / ${b}`;
        }

        function checkAnswer(choice) {
            const feedback = document.getElementById('feedback-box');
            document.getElementById('quiz-feedback').style.display = 'block';
            const res = getPlayerType(0,0,0,0); // แค่ดึงสี
            if(choice === currentCorrectAnswer) {
                feedback.style.backgroundColor = "var(--tag-green)";
                feedback.innerHTML = `ถูกต้อง! ✅<br><span style="font-weight:normal; font-size:12px;">${currentDesc}</span>`;
            } else {
                feedback.style.backgroundColor = "var(--tag-red)";
                feedback.innerHTML = `ผิด! คำตอบคือเบอร์ ${currentCorrectAnswer} ❌<br><span style="font-weight:normal; font-size:12px;">(${currentDesc})</span>`;
            }
        }

        function copyGGNote() {
            const note = document.getElementById('copy-btn').dataset.ggnote;
            navigator.clipboard.writeText(note).then(() => {
                const btn = document.getElementById('copy-btn');
                btn.innerText = "✅ คัดลอกแล้ว!";
                setTimeout(() => { btn.innerText = "📋 คัดลอกโน้ต"; }, 1500);
            });
        }
    </script>
</body>
</html>
